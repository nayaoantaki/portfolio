<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/png" href="../../assets/smiley%20favicon.png" />
  <link rel="stylesheet" href="../../css/project-page.css" />
  <script src="../../js/nav-bar.js" defer></script>
  <script src="../../js/theme-toggle.js" defer></script>
  <script src="../../js/project-image-lightbox.js" defer></script>
  <title>naya antaki</title>
</head>
<body>

    <div data-site-nav data-assets-prefix="../../assets" data-home-href="../../" data-home-label="↖ home"></div>

  <main class="case-shell">
    <section class="case-study-layout">
      <div class="case-study-left">
        <header class="case-title-box" data-cs-title>project title</header>

        <section class="case-text-panel">
          <h2 class="section-chip">overview</h2>
          <div class="section-box" data-cs-overview>
            Add a concise project overview here. Summarize the problem, audience, and final outcome in a few lines.
          </div>

          <div class="case-detail-columns">
            <div class="case-detail-column">
              <h2 class="section-chip" data-cs-secondary-title>process</h2>
              <div class="section-box" data-cs-secondary-body>
                Add your process notes, achievements, and key takeaways here. You can split this into bullets later if needed.
              </div>
            </div>

            <div class="case-detail-column">
              <h2 class="section-chip">tools</h2>
              <div class="section-box" data-cs-tools>
                <div class="tool-lines" aria-label="Software used"></div>
              </div>
            </div>
          </div>
        </section>
      </div>

      <div class="case-study-right" aria-label="Project visuals">
        <div data-cs-media></div>
      </div>
    </section>
  </main>

</body>
</html>
